name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create env file
        run: |
          cat > .env <<EOF
          DATABASE_URL=postgresql://app_user:app_password@db:5432/app_db
          TEST_DATABASE_URL=postgresql://app_user:app_password@test_db:5432/app_test_db
          SECRET_KEY=test-secret-key
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          EOF

      - name: Build containers
        run: docker compose build

      - name: Start containers
        run: docker compose up -d

      - name: Run lint
        run: docker compose exec -T api ruff check .

      - name: Run tests
        run: docker compose exec -T api pytest -v

      - name: Stop containers
        if: always()
        run: docker compose down