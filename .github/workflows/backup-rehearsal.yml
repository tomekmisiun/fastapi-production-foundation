name: Backup Rehearsal

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Print the rehearsal plan without restoring data
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  backup-rehearsal:
    runs-on: ubuntu-latest
    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Create env file for compose
        run: |
          cat > .env <<EOF
          DATABASE_URL=postgresql://app_user:app_password@db:5432/app_db
          TEST_DATABASE_URL=postgresql://app_user:app_password@test_db:5432/app_test_db
          SECRET_KEY=test-secret-key-for-ci-only
          S3_ACCESS_KEY_ID=minioadmin
          S3_SECRET_ACCESS_KEY=minioadmin
          EOF

      - name: Log in to Docker Hub
        if: inputs.dry_run == false
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Start database dependency
        if: inputs.dry_run == false
        run: |
          bash scripts/ci/compose_pull_retry.sh db
          docker compose up -d db

      - name: Run migrations
        if: inputs.dry_run == false
        run: docker compose run --rm api alembic upgrade head

      - name: Create backup
        env:
          DRY_RUN: ${{ inputs.dry_run }}
        run: bash scripts/db_backup.sh

      - name: Rehearse restore
        env:
          DRY_RUN: ${{ inputs.dry_run }}
        run: bash scripts/db_restore_rehearsal.sh

      - name: Stop containers
        if: always() && inputs.dry_run == false
        run: docker compose down
